name: release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
          - info
          - warning
          - debug
      draft:
        description: 'Whether creates a draft release'
        required: true
        type: boolean
        default: false

jobs:
  flutter_build_ohos:
    name: Release for ohos
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Extract tag name
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
        shell: bash
      - name: Echo build progress
        run: echo "Kazumi_ohos_${{ env.tag }}_unsigned.hap build progress"
        shell: bash
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl xz-utils zip libglu1-mesa
        shell: bash
      - name: Setup HarmonyOS toolchain
        uses: ErBWs/setup-ohos@v1
        with:
          version: latest
          cache: true
      - name: Setup JDK17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup flutter-ohos
        run: |
          git clone -b oh-3.35.7-dev https://gitcode.com/openharmony-tpc/flutter_flutter.git $GITHUB_WORKSPACE/flutter
          echo "$GITHUB_WORKSPACE/flutter/bin" >> $GITHUB_PATH
        shell: bash
      - name: Get Flutter dependencies
        run: GIT_LFS_SKIP_SMUDGE=1 flutter pub get
        shell: bash
      - name: Inject DanDan API Credentials
        env:
          DANDANAPI_APPID: ${{ secrets.DANDANAPI_APPID }}
          DANDANAPI_KEY: ${{ secrets.DANDANAPI_KEY }}
        run: |
          perl -0pi -e 's/kvpx7qkqjh/$ENV{DANDANAPI_APPID}/g; s/rABUaBLqdz7aCSi3fe88ZDj2gwga9Vax/$ENV{DANDANAPI_KEY}/g' lib/utils/dandan_credentials.dart
        shell: bash
      - name: Inject Bangumi mirror credentials
        env:
          KAZUMI_APPID: ${{ secrets.KAZUMI_APPID }}
          KAZUMI_KEY: ${{ secrets.KAZUMI_KEY }}
        run: |
          perl -0pi -e 's/KAZUMI_APPID/$ENV{KAZUMI_APPID}/g; s/KAZUMI_KEY/$ENV{KAZUMI_KEY}/g' lib/utils/bangumi_mirror_credentials.dart
        shell: bash
      - name: Build Flutter for ohos
        run: flutter build hap --release --dart-define=ENABLE_FLEX_OVERFLOW=false
        shell: bash
        continue-on-error: true
      - name: Package ohos build output
        run: cp ./ohos/entry/build/default/outputs/default/entry-default-unsigned.hap Kazumi_ohos_${{ env.tag }}_unsigned.hap
        shell: bash
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.tag }}-ohos
          draft: ${{ inputs.draft }}
          files: Kazumi_ohos_*.hap
